name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-verygoodadblock
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://verygoodadblock.org
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Add deploy SSH key
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
            chmod 644 ~/.ssh/id_ed25519.pub
          fi

      # Build the static site (the site config's `build` hook runs site:build),
      # then ship it to the shared stacks box. ts-cloud attaches to
      # `stacks-production-app`, adds an additive rpx site for verygoodadblock.org
      # + its DNS, and never touches the box lifecycle or other tenants.
      - name: Deploy verygoodadblock.org
        run: bun node_modules/@stacksjs/buddy/dist/cli.js deploy --prod --yes
        env:
          APP_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_KEY: ${{ secrets.PORKBUN_SECRET_KEY }}
          COPYFILE_DISABLE: '1'
