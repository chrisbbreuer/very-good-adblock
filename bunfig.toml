# Preload only the env layer. This is a static-site deploy with no app runtime,
# so we skip the full app preloader (auto-imports of routes/models/functions) —
# buddy just loads config/cloud.ts and hands off to ts-cloud.
preload = [
  "./scripts/debug-exit-preload.ts",
  "@stacksjs/env/plugin.js",
]

[install]
registry = { url = "https://registry.npmjs.org/", token = "$BUN_AUTH_TOKEN" }
linker = "hoisted"
